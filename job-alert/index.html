/* ─── MAIN ENGINE ──────────────────────────────────────── */
async function runJobAlerts(){

  console.log("Checking alerts...");

  const {data:alerts,error}=await sb
    .from("job_alerts")
    .select("*")
    .eq("status",1)
    .lte("next_run_at",new Date().toISOString());

  if(error){ console.error(error); return; }
  if(!alerts||alerts.length===0){ console.log("No alerts due"); return; }

  for(const alert of alerts){

    console.log("Processing:",alert.email);

    /* GET PROFILE */
    const {data:profile}=await sb
      .from("developers")
      .select("*")
      .eq("user_id",alert.user_id)
      .single();

    if(!profile){ console.log("No profile"); continue; }

    /* AI KEYWORD */
    const prompt=`
Generate one job search keyword.
Title: ${profile.title}
Skills: ${profile.skills}
Experience: ${profile.experience_years}
Location: ${profile.location}
Return only the keyword, nothing else.
`;

    const aiRes=await fetch(AI_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const aiData=await aiRes.json();
    const keyword=
      aiData?.choices?.[0]?.message?.content?.trim()||
      aiData?.response||
      aiData?.text||"";

    console.log("AI keyword:",keyword);
    if(!keyword){ console.log("No keyword"); continue; }

    /* SAVE KEYWORD */
    await sb.from("job_alert_keywords").insert({user_id:alert.user_id,keyword});

    /* SEARCH JOBS */
    const jobRes=await fetch(
      `${JOB_SEARCH}?q=${encodeURIComponent(keyword)}&pages=3&categories=jobs,general`
    );
    const jobData=await jobRes.json();
    const jobs=jobData.results||[];

    if(!jobs||jobs.length===0){ console.log("No jobs found"); continue; }

    /* DUPLICATE FILTER */
    let emailJobs=[];

    for(const job of jobs.slice(0,5)){
      const {data:exist}=await sb
        .from("job_alert_history")
        .select("id")
        .eq("user_id",alert.user_id)
        .eq("job_url",job.url)
        .maybeSingle();

      if(exist) continue;

      emailJobs.push(job);

      await sb.from("job_alert_history").insert({
        user_id:alert.user_id,
        job_url:job.url,
        job_title:job.title
      });
    }

    if(emailJobs.length===0){ console.log("No new jobs"); continue; }

    /* BUILD & SEND EMAIL */
    const html=buildEmailHTML(emailJobs, profile, keyword);
    await sendMail(alert.email, html);
    await updateNextRun(alert);
  }
}

/* ─── SEND EMAIL ───────────────────────────────────────── */
async function sendMail(toEmail,htmlContent){

  const payload={
    sender:{name:SENDER_NAME,email:SENDER_EMAIL},
    to:[{email:toEmail}],
    subject:`\uD83D\uDE80 ${toEmail.split('@')[0]}, New Dev Jobs Matched For You`,
    htmlContent
  };

  const res=await fetch("https://api.brevo.com/v3/smtp/email",{
    method:"POST",
    headers:{
      "accept":"application/json",
      "api-key":BREVO_KEY,
      "content-type":"application/json"
    },
    body:JSON.stringify(payload)
  });

  const data=await res.json();
  console.log("Email sent:",data);
}

/* ─── UPDATE NEXT RUN ──────────────────────────────────── */
async function updateNextRun(alert){
  let days=7;
  if(alert.mode==="15_days") days=15;
  if(alert.mode==="1_month") days=30;

  await sb
    .from("job_alerts")
    .update({
      last_run_at:new Date().toISOString(),
      next_run_at:new Date(Date.now()+days*86400000).toISOString()
    })
    .eq("id",alert.id);
}

/* ─── RUN ──────────────────────────────────────────────── */
