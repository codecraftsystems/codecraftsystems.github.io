<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Profile | CodeCraft Systems</title>
  <meta name="description" content="Laravel and Vue.js developer profile." />
  <link rel="canonical" id="canonical" href="https://codecraftsystems.github.io/developer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/developers.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="logo" href="/"><span>CodeCraft</span> Systems</a>
      <nav class="top-links">
        <a href="/developers">Developers</a>
        <a href="/submit-profile">Submit Profile</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 id="name">Developer Profile</h1>
    <div id="status" class="alert">Loading profile...</div>
    <article id="profile" class="profile" hidden>
      <img id="profileImage" class="profile-image" src="" alt="Developer profile image" />
      <div>
        <h2 id="title"></h2>
        <div class="meta" id="experience"></div>
        <div id="openToWorkWrap" style="margin-top:8px;"></div>
        <p id="bio" style="margin-top:12px;"></p>
        <div class="stack" id="skills"></div>
        <div class="links" id="links"></div>
      </div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/developers.js"></script>
  <script>
    function getSlug() {
      const url = new URL(window.location.href);
      if (url.searchParams.get('slug')) return devDirectory.slugify(url.searchParams.get('slug'));
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts[0] === 'developer' && parts[1]) return devDirectory.slugify(parts[1]);
      return '';
    }

    async function loadProfile() {
      const statusEl = document.getElementById('status');
      const profileEl = document.getElementById('profile');
      const slug = getSlug();
      if (!slug) {
        statusEl.textContent = 'Missing developer slug in URL.';
        return;
      }

      try {
        const supabase = devDirectory.createClient();
        const { data, error } = await supabase
          .from('developers')
          .select('*')
          .eq('slug', slug)
          .single();

        if (error) throw error;
        if (!data) {
          statusEl.textContent = 'Developer not found.';
          return;
        }

        document.title = `${data.name} | ${data.title || 'Laravel & Vue.js Developer'}`;
        const description = `${data.name} - ${data.title || 'Laravel & Vue.js Developer'}. ${data.experience_years || 0}+ years experience. ${data.skills || ''}`;
        let metaDescription = document.querySelector('meta[name="description"]');
        if (!metaDescription) {
          metaDescription = document.createElement('meta');
          metaDescription.setAttribute('name', 'description');
          document.head.appendChild(metaDescription);
        }
        metaDescription.setAttribute('content', description.substring(0, 155));

        document.getElementById('canonical').setAttribute('href', `https://codecraftsystems.github.io/developer/${data.slug}`);
        document.getElementById('name').textContent = data.name;
        document.getElementById('title').textContent = data.title || 'Laravel & Vue.js Developer';
        document.getElementById('experience').textContent = `Experience: ${data.experience_years || 0} years`;
        document.getElementById('bio').textContent = data.bio || 'No bio added yet.';
        document.getElementById('profileImage').src = data.profile_image || 'https://placehold.co/360x360/1e1e25/ffffff?text=DEV';
        document.getElementById('profileImage').alt = `${data.name} profile image`;

        const openToWorkWrap = document.getElementById('openToWorkWrap');
        openToWorkWrap.innerHTML = data.open_to_work ? '<span class="pill">Open to work</span>' : '';

        const skills = (data.skills || '').split(',').map(s => s.trim()).filter(Boolean);
        document.getElementById('skills').innerHTML = skills.map(skill => `<span class="chip">${devDirectory.escapeHtml(skill)}</span>`).join('');

        const links = [
          { label: 'GitHub', url: data.github_url },
          { label: 'LinkedIn', url: data.linkedin_url },
          { label: 'Portfolio', url: data.portfolio_url }
        ].filter(link => link.url);
        document.getElementById('links').innerHTML = links
          .map(link => `<a class="button secondary" target="_blank" rel="noopener" href="${devDirectory.escapeHtml(link.url)}">${link.label}</a>`)
          .join('');

        statusEl.hidden = true;
        profileEl.hidden = false;
      } catch (error) {
        statusEl.textContent = error.message;
      }
    }

    loadProfile();
  </script>
</body>
</html>
