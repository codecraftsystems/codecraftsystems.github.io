<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Profile | CodeCraft Systems</title>
  <meta name="description" content="Developer profile in Laravel + Vue.js network." />
  <link rel="canonical" id="canonical" href="https://codecraftsystems.github.io/developer/" />
  <link rel="stylesheet" href="../assets/developers.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="logo" href="../"><span>CodeCraft</span> Systems</a>
      <nav class="top-links">
        <a href="../developers/">All Developers</a>
        <a href="../developers-open-to-work/">Open to Work</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 id="name">Developer Profile</h1>
    <div id="status" class="alert">Loading profile...</div>
    <article id="profile" class="profile" hidden>
      <img id="profileImage" class="profile-image" src="" alt="profile image" />
      <div>
        <h2 id="title"></h2>
        <p id="meta" class="meta"></p>
        <div id="badges"></div>
        <p id="bio"></p>
        <div id="skills" class="stack"></div>
        <div id="links" class="links"></div>
      </div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/developers.js"></script>
  <script>
    function findSlug() {
      const qp = new URLSearchParams(location.search).get('slug');
      if (qp) return devDirectory.slugify(qp);
      const hashSlug = location.hash.replace(/^#/, '').trim();
      if (hashSlug) return devDirectory.slugify(hashSlug);
      const p = location.pathname.split('/').filter(Boolean);
      if (p[0] === 'developer' && p[1]) return devDirectory.slugify(p[1]);
      return '';
    }

    (async function () {
      const slug = findSlug();
      const statusEl = document.getElementById('status');
      const forceCleanPath = new URLSearchParams(location.search).get('clean') === '1';
      if (!slug) return statusEl.textContent = 'Missing slug.';
      try {
        const sb = devDirectory.createClient();
        const { data, error } = await sb.from('developers').select('*').eq('slug', slug).single();
        if (error) throw error;
        if (!data) return statusEl.textContent = 'Profile not found.';

        document.title = `${data.name} | ${data.title || 'Laravel + Vue.js Developer'}`;
        const desc = `${data.name}, ${data.title || 'Developer'} with ${data.experience_years || 0} years. Skills: ${data.skills || ''}`.slice(0, 155);
        document.querySelector('meta[name="description"]').setAttribute('content', desc);
        document.getElementById('canonical').setAttribute('href', `https://codecraftsystems.github.io/developer/${data.slug}`);
        if (forceCleanPath || location.search.includes('slug=')) {
          history.replaceState({}, '', `/developer/${data.slug}`);
        }

        document.getElementById('name').textContent = data.name;
        document.getElementById('title').textContent = data.title || 'Laravel + Vue.js Developer';
        document.getElementById('meta').textContent = `Experience: ${Number(data.experience_years || 0)} years`;
        document.getElementById('bio').textContent = data.bio || '';
        document.getElementById('profileImage').src = devDirectory.normalizeImageUrl(data.profile_image);
        document.getElementById('profileImage').alt = `${data.name} image`;
        document.getElementById('profileImage').onerror = function () {
          this.onerror = null;
          this.src = devDirectory.DEFAULT_PROFILE_IMAGE;
        };

        let badges = '';
        if (data.open_to_work) badges += '<span class="pill">Open to work</span>';
        if (data.verified) badges += '<span class="badge-danger">Verified</span>';
        document.getElementById('badges').innerHTML = badges;

        const skills = (data.skills || '').split(',').map(s => s.trim()).filter(Boolean);
        document.getElementById('skills').innerHTML = skills.map(s => `<span class="chip">${devDirectory.escapeHtml(s)}</span>`).join('');

        const links = [
          ['GitHub', data.github_url], ['LinkedIn', data.linkedin_url], ['Portfolio', data.portfolio_url]
        ].filter(i => i[1]);
        document.getElementById('links').innerHTML = links.map(i => `<a class="button secondary" target="_blank" rel="noopener" href="${devDirectory.escapeHtml(i[1])}">${i[0]}</a>`).join('');

        statusEl.hidden = true;
        document.getElementById('profile').hidden = false;
      } catch (e) {
        statusEl.textContent = e.message;
      }
    })();
  </script>
</body>
</html>
