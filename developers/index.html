<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developers Directory | Laravel + Vue.js Talent</title>
  <meta name="description" content="Hire or discover Laravel and Vue.js developers. Skills, profile links, experience, and open-to-work availability." />
  <link rel="canonical" href="https://codecraftsystems.github.io/developers/" />
  <link rel="stylesheet" href="../assets/developers.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="logo" href="../"><span>CodeCraft</span> Systems</a>
      <nav class="top-links">
        <a href="../developers-open-to-work/">Open to Work</a>
        <a href="../submit-profile/">Create / Update Profile</a>
        <a href="../auth/">Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Laravel + Vue.js Developers Directory</h1>
      <p>Mission: jobless talent ko visibility dena. Search developers, check availability, and directly connect via links.</p>
      <div class="toolbar">
        <input id="search" class="input" type="search" placeholder="Search by name, title, skills" />
        <button id="refresh" class="button secondary" type="button">Refresh</button>
      </div>
    </section>

    <div id="status" class="alert">Loading developers...</div>
    <section id="grid" class="grid"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/developers.js"></script>
  <script>
    const grid = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const searchInput = document.getElementById('search');
    const refreshBtn = document.getElementById('refresh');
    let all = [];

    function card(dev) {
      const image = dev.profile_image || 'https://placehold.co/300x300/1b2437/ffffff?text=DEV';
      const skills = (dev.skills || '').split(',').map(s => s.trim()).filter(Boolean).slice(0, 4).join(' • ');
      return `
        <article class="card">
          <div class="card-top">
            <img loading="lazy" src="${devDirectory.escapeHtml(image)}" alt="${devDirectory.escapeHtml(dev.name)}" />
            <div>
              <h3>${devDirectory.escapeHtml(dev.name)}</h3>
              <p class="title">${devDirectory.escapeHtml(dev.title || 'Laravel / Vue.js Developer')}</p>
            </div>
          </div>
          <div class="skills">${devDirectory.escapeHtml(skills || 'Laravel • Vue.js')}</div>
          <div class="exp">Experience: ${Number(dev.experience_years || 0)} years ${dev.open_to_work ? '<span class="pill">Open to work</span>' : ''}</div>
          <a class="button" href="../developer/${devDirectory.escapeHtml(dev.slug)}">View Profile</a>
        </article>
      `;
    }

    function render(data) {
      if (!data.length) {
        statusEl.textContent = 'No developer profiles found.';
        grid.innerHTML = '';
        return;
      }
      statusEl.textContent = `${data.length} profiles found`;
      grid.innerHTML = data.map(card).join('');
    }

    function filter() {
      const term = searchInput.value.trim().toLowerCase();
      if (!term) return render(all);
      const filtered = all.filter(d => `${d.name} ${d.title} ${d.skills}`.toLowerCase().includes(term));
      render(filtered);
    }

    async function loadData() {
      try {
        statusEl.textContent = 'Loading developers...';
        const sb = devDirectory.createClient();
        const { data, error } = await sb
          .from('developers')
          .select('name,slug,title,skills,experience_years,profile_image,open_to_work')
          .order('open_to_work', { ascending: false })
          .order('created_at', { ascending: false });
        if (error) throw error;
        all = data || [];
        render(all);
      } catch (e) {
        statusEl.textContent = e.message;
        grid.innerHTML = '';
      }
    }

    searchInput.addEventListener('input', filter);
    refreshBtn.addEventListener('click', loadData);
    loadData();
  </script>
</body>
</html>
