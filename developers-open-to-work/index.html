<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developers Open to Work | Laravel + Vue.js</title>
  <meta name="description" content="Developers currently open to work for Laravel and Vue.js jobs or freelance projects." />
  <link rel="stylesheet" href="../assets/developers.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="logo" href="../"><span>CodeCraft</span> Systems</a>
    <nav class="top-links">
      <a href="../developers/">All Developers</a>
      <a href="../submit-profile/">Create / Update Profile</a>
    </nav>
  </div>
</header>
<main class="container">
  <section class="hero">
    <h1>Developers Open to Work</h1>
    <p>Only those profiles are listed here who marked themselves as currently available.</p>
  </section>
  <div id="status" class="alert">Loading...</div>
  <section id="grid" class="grid"></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-config.js"></script>
<script src="../assets/developers.js"></script>
<script>
  const statusEl = document.getElementById('status');
  const grid = document.getElementById('grid');
  (async function () {
    try {
      const sb = devDirectory.createClient();
      const { data, error } = await sb
        .from('developers')
        .select('name,slug,title,skills,experience_years,profile_image')
        .eq('open_to_work', true)
        .order('created_at', { ascending: false });
      if (error) throw error;
      const list = data || [];
      statusEl.textContent = `${list.length} open-to-work developers`;
      grid.innerHTML = list.map(dev => `
        <article class="card">
          <div class="card-top">
            <img src="${devDirectory.escapeHtml(devDirectory.normalizeImageUrl(dev.profile_image))}" alt="${devDirectory.escapeHtml(dev.name)}" onerror="this.onerror=null;this.src=devDirectory.DEFAULT_PROFILE_IMAGE;" />
            <div>
              <h3>${devDirectory.escapeHtml(dev.name)}</h3>
              <p class="title">${devDirectory.escapeHtml(dev.title || 'Laravel / Vue.js Developer')}</p>
            </div>
          </div>
          <div class="skills">${devDirectory.escapeHtml(dev.skills || '')}</div>
          <div class="exp">Experience: ${Number(dev.experience_years || 0)} years <span class="pill">Open to work</span></div>
          <a class="button" href="/developer/${encodeURIComponent(dev.slug || '')}">View Profile</a>
        </article>
      `).join('');
    } catch (e) {
      statusEl.textContent = e.message;
    }
  })();
</script>
</body>
</html>
