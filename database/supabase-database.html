<!DOCTYPE html>
<html>
<head>
  <title>Supabase Post Example</title>

  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 28px auto; padding: 0 16px; line-height: 1.5; }
    .breadcrumb { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:0.78rem; color:#5b6370; margin:0 0 18px; position:relative; top:auto; left:auto; right:auto; padding:6px 0; }
    .breadcrumb a { color:#5b6370; text-decoration:none; }
    .breadcrumb a:hover { color:#1f6feb; }
    .sep { color:#8b949e; }
    @media (max-width: 768px) {
      .breadcrumb { font-size:0.68rem; gap:6px; padding:4px 0; }
    }
  </style>

</head>
<body>

<nav class="breadcrumb" aria-label="breadcrumb">
  <a href="https://codecraftsystems.github.io/">Home</a><span class="sep">›</span>
  <a href="https://codecraftsystems.github.io/database/blog.html">Database</a><span class="sep">›</span>
  <span>Supabase Database Demo</span>
</nav>


<h2>Create Post</h2>

<input type="text" id="title" placeholder="Title"><br><br>
<textarea id="content" placeholder="Content"></textarea><br><br>
<button onclick="addPost()">Save Post</button>

<h2>All Posts</h2>
<ul id="postList"></ul>

<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Database Connection -->
<script src="db.js"></script>

<script>
async function addPost() {
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;

  const { data, error } = await supabaseClient
    .from('posts')
    .insert([{ title, content }]);

  if (error) {
    alert(error.message);
  } else {
    alert("Post saved!");
    loadPosts();
  }
}

async function loadPosts() {
  const { data, error } = await supabaseClient
    .from('posts')
    .select('*')
    .order('id', { ascending: false });

  const list = document.getElementById('postList');
  list.innerHTML = '';

  data.forEach(post => {
    const li = document.createElement('li');
    li.innerHTML = `<b>${post.title}</b><br>${post.content}<hr>`;
    list.appendChild(li);
  });
}

loadPosts();
</script>



<footer>
  <ul class="footer-links">
    <li><a href="../tech-news-feed/">Tech News</a></li>
  </ul>
</footer>
</body>
</html>
